name: bacwgs_env

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  - python=3.11

  # Quality control
  - fastqc=0.12.1
  - trimmomatic=0.40

  # Taxonomic classification
  - kraken2=2.1.3
  - bracken=3.1

  # Genome assembly
  - spades=4.0.0

  # Assembly assessment
  - quast=5.3.0

  # Genome characterization
  - ncbi-amrfinderplus=4.2.7
  - abricate=1.0.1

  # Read mapping
  - bowtie2=2.5.4
  - samtools=1.21

  # General utilities
  - seqkit
  - pigz
  - parallel

  # Shell utilities
  - coreutils
  - gawk
  - sed
  - grep
